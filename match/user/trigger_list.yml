  - trigger: "jgyml"
    label: "List YAML files"
    replace: "{{jgyml_list}}"
    vars:
      - name: jgyml_list
        type: script
        params:
          args:
            - python3
            - -c
            - |
              import os
              import platform
              from pathlib import Path

              def find_match_dir():
                  env_dir = os.environ.get("ESPANSO_MATCH_DIR")
                  if env_dir:
                      return Path(env_dir).expanduser()

                  system = platform.system()
                  home = Path.home()
                  if system == "Windows":
                      base = Path(os.environ.get("APPDATA", home / "AppData/Roaming"))
                      return base / "espanso" / "match" / "user"
                  if system == "Darwin":
                      return home / "Library" / "Application Support" / "espanso" / "match" / "user"
                  return Path(os.environ.get("XDG_CONFIG_HOME", home / ".config")) / "espanso" / "match" / "user"

              directory = find_match_dir()

              def get_yaml_files(directory):
                  return sorted([os.path.splitext(f)[0] for f in os.listdir(directory) if f.endswith(".yml")])

              def main():
                  if not directory.exists():
                      print(f"[JGYML] Match directory not found: {directory}")
                      return
                  files = get_yaml_files(directory)
                  lines = ["=========JGYML==========", "", "YAML files:", ""]
                  lines.extend(files)
                  lines.extend(["", "\u200b"])
                  print("\n".join(lines))

              main()

  - regex: "[Jj][Gg]_(?P<file>[A-Za-z0-9_]+)(\\.|\\s)"
    label: "Show triggers + labels for YAML"
    replace: "{{jg_file_triggers}}"
    vars:
      - name: jg_file_triggers
        type: script
        params:
          args:
            - python3
            - -c
            - |
              import os
              import platform
              import yaml
              from pathlib import Path

              def find_match_dir():
                  env_dir = os.environ.get("ESPANSO_MATCH_DIR")
                  if env_dir:
                      return Path(env_dir).expanduser()

                  system = platform.system()
                  home = Path.home()
                  if system == "Windows":
                      base = Path(os.environ.get("APPDATA", home / "AppData/Roaming"))
                      return base / "espanso" / "match" / "user"
                  if system == "Darwin":
                      return home / "Library" / "Application Support" / "espanso" / "match" / "user"
                  return Path(os.environ.get("XDG_CONFIG_HOME", home / ".config")) / "espanso" / "match" / "user"

              directory = find_match_dir()

              def get_entries(file_path):
                  entries = []
                  with open(file_path, "r", encoding="utf-8") as file:
                      try:
                          data = yaml.safe_load(file)
                      except yaml.YAMLError:
                          return entries

                  if not isinstance(data, dict) or "matches" not in data:
                      return entries

                  for match in data["matches"]:
                      if not isinstance(match, dict):
                          continue

                      label = str(match.get("label", "")).strip() or "[No label]"

                      if "trigger" in match:
                          entries.append((str(match["trigger"]), label))
                          continue

                      if "triggers" in match and isinstance(match["triggers"], list):
                          for t in match["triggers"]:
                              entries.append((str(t), label))
                          continue

                      if "regex" in match:
                          entries.append((f"regex:{match['regex']}", label))

                  entries.sort(key=lambda x: (x[0].lower(), x[1].lower()))
                  return entries

              def main():
                  name = os.environ.get("ESPANSO_FILE", "").strip()
                  if not name:
                      print("[JG] No file name captured.")
                      return

                  if not directory.exists():
                      print(f"[JG {name}] Match directory not found: {directory}")
                      return

                  mapping = {
                      os.path.splitext(f)[0].lower(): f
                      for f in os.listdir(directory)
                      if f.endswith(".yml")
                  }

                  key = name.lower()
                  filename = mapping.get(key)
                  header = f"=========JG_{name}=========="

                  if not filename:
                      print(header + f"\n\n[File not found: {name}.yml]\n\n\u200b")
                      return

                  file_path = directory / filename

                  entries = get_entries(file_path)
                  if entries:
                      lines = [header, filename, ""]
                      lines.extend(f"{t} - {label}" for t, label in entries)
                      lines.extend(["", "\u200b"])
                      print("\n".join(lines))
                  else:
                      print(header + "\n\n[No triggers found]\n\n\u200b")

              main()
