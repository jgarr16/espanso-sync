      Position: Chief Information Officer
      Level: SES
      From: 9/2019 - Present 
      Employer: National Aeronautics and Space Administration, Moffett Field, CA 94035
      As the Chief Information Officer for NASA's Ames Research Center (ARC) in Silicon Valley, I lead the center's IT operations and serve as a senior executive on the agency's OCIO team. I oversee a diverse team of civil servants and contractors, delivering cutting-edge IT services to support mission-critical research. My responsibilities include strategic planning, IT policy development, cybersecurity oversight, and knowledge management at both local and enterprise levels. 
      Leadership in Operations and Strategic Planning: 
      - Direct IT operations for NASA ARC, collaborating with department heads to provide guidance, support, and problem-solving expertise across diverse scientific disciplines. 
      - Develop and implement IT policies and procedures to govern IT solutions management functions at the enterprise level.
      - Provide IT infrastructure, enterprise services (e.g., email, remote access, compute services, network, data center), and local, on-demand services (e.g., ComSec, radio-frequency, and spectrum management). 
      - Assist in developing, staffing, and publishing operational plans and orders that impact resource allocation and mission objectives. 
      - Actively participate in the Ames Center Priorities discussions, ensuring the ARC Center CIO's perspective is well-represented and initiatives are aligned with the center's broader goals.
      Cybersecurity Leadership: 
      - Serve as the Authorizing Official Designated Representative (AODR) for ARC, providing technical and organizational support to the Authorizing Official for 24 System Security Plans, comprising 2,500 individual security controls. 
      - Lead agency-wide responses to cybersecurity vulnerabilities and initiatives, such as the Ivanti vulnerability and the National Security Council (NSC) cybersecurity initiative.
      - Implement risk-based approaches to enhance the organization's overall cybersecurity posture.
      Virtual Presence and Future of Work Initiatives: 
      - Chair the OCIO Future of Work (FoW) workgroup, driving cultural change and digital transformation initiatives. 
      - Enhance enterprise-wide knowledge management systems to improve information sharing and decision-making processes. 
      - Provision modern, hybrid collaboration capabilities and enable hoteling workspaces across the center.
      - Promote the adoption of cloud computing capabilities, demonstrating fiscal responsibility and technological foresight. 
      Organizational Transformation and Change Management: 
      - Lead the transition from a decades-old decentralized organizational structure to a centralized architecture, aligning with NASA's OCIO Transformation Effort. 
      - Foster trust and cooperation during major organizational changes, demonstrating change management expertise. 
      - Collaborate with other center CIOs and business line organizations to leverage resources, share best practices, and identify opportunities for cost savings and process improvements.
      - Coordinate with department heads to negotiate and implement work-related changes affecting multiple activities, showcasing ability to work in joint, interagency environments.

